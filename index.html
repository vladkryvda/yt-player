<!DOCTYPE html>
<html lang="uk" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>•</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* СУВОРИЙ ЗАБОРОН КУРСОРУ */
*, *::before, *::after { 
  box-sizing: border-box; 
  margin: 0; 
  padding: 0; 
  cursor: none !important; 
  -webkit-user-select: none;
  user-select: none;
}

/* Дозволяємо взаємодію з текстом в інпуті та текстовому полі, але БЕЗ курсора */
input, textarea {
  user-select: text !important;
  -webkit-user-select: text !important;
  cursor: none !important;
}

/* Захист при кліку */
*:active {
  cursor: none !important;
}

:root { --ease: cubic-bezier(.4,0,.2,1); }

[data-theme="dark"] {
  --bg:          #000000;
  --line:        rgba(255,255,255,0.13);
  --text:        rgba(210,210,210,0.9);
  --inp-text:    rgba(210,210,210,0.9);
  --muted:       rgba(210,210,210,0.35);
  --placeholder: rgba(210,210,210,0.25);
  --faint:       rgba(210,210,210,0.38);
  --ok:          #6aab7e;
  --err:         #b85c5c;
  --corner:      rgba(255,255,255,0.13);
  --cursor-bg:   rgba(210,210,210,0.9);
}

[data-theme="light"] {
  --bg:          #87CEEB;
  --line:        rgba(26, 43, 60, 0.1);
  --text:        #1a2b3c; 
  --inp-text:    #0a1a2a; 
  --muted:       rgba(26, 43, 60, 0.5);
  --placeholder: rgba(26, 43, 60, 0.35);
  --faint:       rgba(26, 43, 60, 0.4);
  --ok:          #2d5a3c;
  --err:         #a63d3d;
  --corner:      rgba(26, 43, 60, 0.2);
  --cursor-bg:   #1a2b3c;
}

#bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }

#cur {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--cursor-bg); position: fixed;
  pointer-events: none; z-index: 9999;
  transform: translate(-50%, -50%);
  transition: width .18s var(--ease), height .18s var(--ease), background .35s;
}
#cur.hover { width: 13px; height: 13px; }

html { 
  height: 100%; 
  background: var(--bg); 
  transition: background 0.8s var(--ease); 
  overflow: hidden; /* Запобігає скролу сторінки */
}

body {
  height: 100%; 
  overflow: hidden; /* Запобігає скролу сторінки */
  font-family: 'Geist', sans-serif;
  color: var(--text); 
  display: flex; 
  flex-direction: column;
  transition: color .35s var(--ease);
}

.top-bar { position: fixed; top: 18px; right: 24px; z-index: 50; }
.theme-btn {
  width: 32px; height: 32px; border: none; background: none;
  color: var(--muted); display: flex; align-items: center; justify-content: center;
  transition: color .2s; position: relative;
}
.theme-btn:hover { color: var(--text); }
.theme-btn svg {
  width: 14px; height: 14px; position: absolute;
  transition: opacity .2s, transform .2s var(--ease);
}
.icon-moon { opacity: 1; transform: rotate(0deg); }
.icon-sun  { opacity: 0; transform: rotate(-45deg); }
[data-theme="light"] .icon-moon { opacity: 0; transform: rotate(45deg); }
[data-theme="light"] .icon-sun  { opacity: 1; transform: rotate(0deg); }

main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 48px 24px; position: relative; z-index: 1; }
.wrap { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 20px; animation: up .5s var(--ease) both; }
@keyframes up { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }

.status-row { height: 14px; display: flex; align-items: center; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: transparent; transition: background .2s; }
.dot.ok { background: var(--ok); }
.dot.err { background: var(--err); }

.inp-area { position: relative; }
.inp-area::before {
  content: ''; position: absolute; left: 0; bottom: 0; width: 12px; height: 12px;
  border-left: 1px solid var(--corner); border-bottom: 1px solid var(--corner);
  border-bottom-left-radius: 4px; pointer-events: none; transition: border-color .35s;
}

input {
  width: 100%; height: 44px; background: transparent; border: none;
  padding: 0 48px 8px 16px; font-family: 'Geist Mono', monospace;
  font-size: 14px; font-weight: 300; color: var(--inp-text);
  outline: none; letter-spacing: .02em; transition: color .35s;
}
input::placeholder { color: var(--placeholder); }

#clr {
  position: absolute; right: 0; top: 50%; transform: translateY(-60%);
  background: none; border: none; color: var(--muted);
  display: none; align-items: center; justify-content: center; width: 36px; height: 36px;
}
#clr.on { display: flex; }
#clr:hover { color: var(--text); }
#clr svg { width: 9px; height: 9px; }

.player-outer { position: relative; width: 100%; aspect-ratio: 16/9; }
.player-outer::before { content: ''; position: absolute; top: 0; right: 0; width: 16px; height: 16px; border-top: 1px solid var(--corner); border-right: 1px solid var(--corner); border-top-right-radius: 4px; z-index: 2; transition: border-color .35s; }
.player-outer::after { content: ''; position: absolute; bottom: 0; left: 0; width: 16px; height: 16px; border-bottom: 1px solid var(--corner); border-left: 1px solid var(--corner); border-bottom-left-radius: 4px; z-index: 2; transition: border-color .35s; }
.player { width: 100%; height: 100%; background: transparent; border-radius: 4px; overflow: hidden; position: relative; }
.ph { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; z-index: 1; transition: opacity .25s; }
.ph.gone { opacity: 0; }
.ph p { font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: .16em; text-transform: uppercase; color: var(--faint); }
.ph svg { width: 20px; height: 20px; color: var(--faint); opacity: 0.5; }
iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; opacity: 0; transition: opacity .3s; z-index: 2; }
iframe.on { opacity: 1; }

/* Повністю прозоре безрамочне поле під плеєром */
.quick-notes {
  width: 100%;
  height: 60px; /* фіксована висота */
  background: transparent;
  border: none;
  outline: none;
  resize: none;
  font-family: 'Geist Mono', monospace;
  font-size: 13px;
  font-weight: 300;
  color: var(--inp-text);
  padding: 8px 16px;
  line-height: 1.5;
  letter-spacing: .02em;
  overflow-y: auto; /* дозволяє прокручування всередині, якщо тексту багато */
  scrollbar-width: none; /* приховує смугу прокручування у Firefox */
  -ms-overflow-style: none; /* приховує смугу прокручування в IE/Edge */
}
.quick-notes::-webkit-scrollbar {
  display: none; /* приховує смугу прокручування у Chrome/Safari */
}
.quick-notes::placeholder {
  color: var(--placeholder);
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div id="cur"></div>

<div class="top-bar">
  <button class="theme-btn" id="themeBtn">
    <svg class="icon-moon" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M12 9.5A5.5 5.5 0 0 1 4.5 2a5.5 5.5 0 1 0 7.5 7.5z"/></svg>
    <svg class="icon-sun" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="7" cy="7" r="2.5"/><path d="M7 .5V2M7 12v1.5M.5 7H2M12 7h1.5M2.8 2.8l1 1M10.2 10.2l1 1M11.2 2.8l-1 1M3.8 10.2l-1 1"/></svg>
  </button>
</div>

<main>
  <div class="wrap">
    <div class="status-row"><div class="dot" id="dot"></div></div>
    <div class="inp-area">
      <input id="inp" type="text" placeholder="вставте посилання на YouTube відео" autocomplete="off" spellcheck="false">
      <button id="clr">
        <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.6"><line x1="1" y1="1" x2="9" y2="9"/><line x1="9" y1="1" x2="1" y2="9"/></svg>
      </button>
    </div>
    
    <div class="player-outer" id="playerOuter">
      <div class="player">
        <div class="ph" id="ph">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="3" width="18" height="14" rx="2"/><polygon points="8,7 14,10 8,13" fill="currentColor" stroke="none"/></svg>
          <p>очікую посилання</p>
        </div>
        <iframe id="frame" allow="autoplay; fullscreen"></iframe>
      </div>
    </div>

    <!-- Поле для швидких нотаток під плеєром -->
    <textarea id="notes" class="quick-notes" placeholder="швидкі нотатки тут..." autocomplete="off" spellcheck="false"></textarea>
  </div>
</main>

<script>
  // Допоміжні функції для безпечної роботи з LocalStorage в різних браузерах
  function safeSave(key, value) {
    try {
      localStorage.setItem(key, value);
    } catch (e) {
      console.warn("Storage write access denied", e);
    }
  }

  function safeGet(key) {
    try {
      return localStorage.getItem(key);
    } catch (e) {
      console.warn("Storage read access denied", e);
      return null;
    }
  }

  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let stars = [], clouds = [];
  let globalAlpha = 0;

  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize); resize();

  class Star {
    constructor() { this.init(); }
    init() {
      this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
      this.size = Math.random() * 1.5; this.alpha = 0; this.maxAlpha = Math.random();
      this.speed = Math.random() * 0.01 + 0.005;
    }
    update() { this.alpha += this.speed; if (this.alpha > this.maxAlpha || this.alpha < 0) this.speed *= -1; }
    draw() { ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha * globalAlpha})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
  }

  class Cloud {
    constructor() {
      this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
      this.r = Math.random() * 150 + 200; 
      this.speed = Math.random() * 0.15 + 0.05;
    }
    update() { this.x += this.speed; if (this.x - this.r > canvas.width) this.x = -this.r; }
    draw() {
      const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r);
      grad.addColorStop(0, `rgba(255, 255, 255, ${0.6 * globalAlpha})`);
      grad.addColorStop(0.4, `rgba(255, 255, 255, ${0.3 * globalAlpha})`);
      grad.addColorStop(0.8, `rgba(255, 255, 255, 0)`);
      ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2); ctx.fill();
    }
  }

  for(let i=0; i<150; i++) stars.push(new Star());
  for(let i=0; i<8; i++) clouds.push(new Cloud());

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const theme = document.documentElement.getAttribute('data-theme');
    if (globalAlpha < 1) globalAlpha += 0.02;
    if (theme === 'dark') {
      stars.forEach(s => { s.update(); s.draw(); });
    } else {
      clouds.forEach(c => { c.update(); c.draw(); });
    }
    requestAnimationFrame(animate);
  }
  animate();

  const curEl = document.getElementById('cur');
  document.onmousemove = (e) => { curEl.style.left = e.clientX + 'px'; curEl.style.top = e.clientY + 'px'; };

  // Додано підтримку 'textarea' для ефекту наведення курсора
  document.querySelectorAll('button, input, textarea, a').forEach(el => {
    el.onmouseenter = () => curEl.classList.add('hover');
    el.onmouseleave = () => curEl.classList.remove('hover');
  });

  function toggleTheme() {
    globalAlpha = 0;
    const html = document.documentElement;
    const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    safeSave('yt-theme', next);
  }

  document.getElementById('themeBtn').onclick = (e) => { e.stopPropagation(); toggleTheme(); };
  
  // Додано виключення для '#notes' (textarea), щоб клік по ньому не перемикав тему
  document.onclick = (e) => { if (!e.target.closest('input, textarea, button, #playerOuter')) toggleTheme(); };

  const inp = document.getElementById('inp');
  const dot = document.getElementById('dot');
  const clr = document.getElementById('clr');
  const frame = document.getElementById('frame');
  const ph = document.getElementById('ph');
  const notes = document.getElementById('notes');

  inp.oninput = () => {
    const v = inp.value; 
    safeSave('yt-saved-link', v); // збереження введеного посилання
    clr.classList.toggle('on', v.length > 0);
    const idMatch = v.match(/[?&]v=([a-zA-Z0-9_-]{11})|youtu\.be\/([a-zA-Z0-9_-]{11})|\/shorts\/([a-zA-Z0-9_-]{11})/);
    const id = idMatch ? (idMatch[1] || idMatch[2] || idMatch[3]) : null;
    if (id) {
      dot.className = 'dot ok'; ph.classList.add('gone'); frame.classList.add('on');
      frame.src = "https://www.youtube.com/embed/" + id;
    } else {
      dot.className = v.trim() ? 'dot err' : 'dot';
      if (!v.trim()) { frame.src = ''; frame.classList.remove('on'); ph.classList.remove('gone'); }
    }
  };

  clr.onclick = (e) => { e.stopPropagation(); inp.value = ''; inp.oninput(); inp.focus(); };

  // Збереження тексту швидких нотаток
  notes.oninput = () => {
    safeSave('yt-saved-notes', notes.value);
  };

  window.onload = () => {
    const saved = safeGet('yt-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', saved);

    // Відновлення та ініціалізація збереженого посилання
    const savedLink = safeGet('yt-saved-link');
    if (savedLink) {
      inp.value = savedLink;
      inp.oninput();
    }

    // Відновлення збережених нотаток
    const savedNotes = safeGet('yt-saved-notes');
    if (savedNotes) {
      notes.value = savedNotes;
    }

    inp.focus();
  };
</script>
</body>
</html>
