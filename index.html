<!DOCTYPE html>
<html lang="uk" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>•</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root { --ease: cubic-bezier(.4,0,.2,1); }

[data-theme="dark"] {
  --bg:          #000000;
  --line:        rgba(255,255,255,0.13);
  --text:        rgba(210,210,210,0.9);
  --inp-text:    rgba(210,210,210,0.9);
  --muted:       rgba(210,210,210,0.35);
  --placeholder: rgba(210,210,210,0.25);
  --faint:       rgba(210,210,210,0.38);
  --ok:          #6aab7e;
  --err:         #b85c5c;
  --corner:      rgba(255,255,255,0.13);
  --cursor-bg:   rgba(210,210,210,0.9);
}

[data-theme="light"] {
  --bg:          #f2dcb1;
  --line:        rgba(0,0,0,0.15);
  --text:        #2e2820;
  --inp-text:    #2e2820;
  --muted:       rgba(46,40,32,0.5);
  --placeholder: rgba(46,40,32,0.32);
  --faint:       rgba(46,40,32,0.35);
  --ok:          #4a7c5a;
  --err:         #8f3f3f;
  --corner:      rgba(46,40,32,0.22);
  --cursor-bg:   #2e2820;
}

/* ── cursor ── */
html, body, *, *::before, *::after { cursor: none !important; }

#cur {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--cursor-bg);
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: width .18s var(--ease), height .18s var(--ease), background .35s;
}
#cur.hover { width: 13px; height: 13px; }

html {
  height: 100%;
  background: var(--bg);
  transition: background .35s var(--ease);
}

body {
  min-height: 100vh;
  font-family: 'Geist', 'Helvetica Neue', sans-serif;
  color: var(--text);
  display: flex;
  flex-direction: column;
  transition: color .35s var(--ease);
  user-select: none;
}

/* ── theme button ── */
.top-bar {
  position: fixed;
  top: 18px; right: 24px;
  z-index: 50;
}

.theme-btn {
  width: 32px; height: 32px;
  border: none; background: none;
  color: var(--muted);
  display: flex; align-items: center; justify-content: center;
  transition: color .2s;
  position: relative;
}
.theme-btn:hover { color: var(--text); }
.theme-btn svg {
  width: 14px; height: 14px;
  position: absolute;
  transition: opacity .2s, transform .2s var(--ease);
}
.icon-moon { opacity: 1; transform: rotate(0deg); }
.icon-sun  { opacity: 0; transform: rotate(-45deg); }
[data-theme="light"] .icon-moon { opacity: 0; transform: rotate(45deg); }
[data-theme="light"] .icon-sun  { opacity: 1; transform: rotate(0deg); }

/* ── main ── */
main {
  flex: 1;
  display: flex; align-items: center; justify-content: center;
  padding: 48px 24px;
}

.wrap {
  width: 100%; max-width: 800px;
  display: flex; flex-direction: column;
  gap: 20px;
  animation: up .5s var(--ease) both;
}

@keyframes up {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── status dot ── */
.status-row {
  height: 14px;
  display: flex; align-items: center;
}

.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: transparent;
  transition: background .2s;
  flex-shrink: 0;
}
.dot.ok  { background: var(--ok); }
.dot.err { background: var(--err); }

/* ── input area ── */
.inp-area { position: relative; }

.inp-area::before {
  content: '';
  position: absolute;
  left: 0; bottom: 0;
  width: 12px; height: 12px;
  border-left: 1px solid var(--corner);
  border-bottom: 1px solid var(--corner);
  border-bottom-left-radius: 4px;
  pointer-events: none;
  transition: border-color .35s;
}

input {
  width: 100%;
  height: 44px;
  background: transparent;
  border: none;
  padding: 0 48px 8px 16px;
  font-family: 'Geist Mono', monospace;
  font-size: 14px;
  font-weight: 300;
  color: var(--inp-text);
  outline: none;
  letter-spacing: .02em;
  transition: color .35s;
  user-select: text;
}
input::placeholder { color: var(--placeholder); }

#clr {
  position: absolute; right: 0; top: 50%;
  transform: translateY(-60%);
  background: none; border: none;
  color: var(--muted);
  display: none; align-items: center; justify-content: center;
  width: 36px; height: 36px;
  transition: color .15s;
}
#clr.on { display: flex; }
#clr:hover { color: var(--text); }
#clr svg { width: 9px; height: 9px; }

/* ── player ── */
.player-outer {
  position: relative;
  width: 100%;
  aspect-ratio: 16/9;
}

/* top-right corner */
.player-outer::before {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 16px; height: 16px;
  border-top: 1px solid var(--corner);
  border-right: 1px solid var(--corner);
  border-top-right-radius: 4px;
  pointer-events: none;
  z-index: 2;
  transition: border-color .35s;
}

/* bottom-left corner */
.player-outer::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0;
  width: 16px; height: 16px;
  border-bottom: 1px solid var(--corner);
  border-left: 1px solid var(--corner);
  border-bottom-left-radius: 4px;
  pointer-events: none;
  z-index: 2;
  transition: border-color .35s;
}

.player {
  width: 100%;
  height: 100%;
  background: transparent;
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}

.ph {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px;
  pointer-events: none;
  transition: opacity .25s var(--ease);
  z-index: 1;
}
.ph.gone { opacity: 0; pointer-events: none; }

.ph svg {
  width: 20px; height: 20px;
  color: var(--faint);
  transition: color .35s;
}
.ph p {
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  font-weight: 400;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--faint);
  transition: color .35s;
}

iframe {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  border: none;
  opacity: 0;
  transition: opacity .3s;
  z-index: 2;
}
iframe.on { opacity: 1; }

/* ── toast ── */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--text);
  color: var(--bg);
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  letter-spacing: .06em;
  padding: 9px 20px;
  border-radius: 4px;
  opacity: 0;
  transition: opacity .2s, transform .2s var(--ease);
  pointer-events: none; white-space: nowrap;
  z-index: 100;
}
.toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 540px) {
  main { padding: 32px 18px; }
  input { font-size: 13px; }
  .top-bar { top: 14px; right: 16px; }
}
</style>
</head>
<body>

<div id="cur"></div>

<div class="top-bar">
  <button class="theme-btn" id="themeBtn" aria-label="Тема">
    <svg class="icon-moon" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
      <path d="M12 9.5A5.5 5.5 0 0 1 4.5 2a5.5 5.5 0 1 0 7.5 7.5z"/>
    </svg>
    <svg class="icon-sun" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
      <circle cx="7" cy="7" r="2.5"/>
      <line x1="7" y1=".5" x2="7" y2="2"/>
      <line x1="7" y1="12" x2="7" y2="13.5"/>
      <line x1=".5" y1="7" x2="2" y2="7"/>
      <line x1="12" y1="7" x2="13.5" y2="7"/>
      <line x1="2.8" y1="2.8" x2="3.8" y2="3.8"/>
      <line x1="10.2" y1="10.2" x2="11.2" y2="11.2"/>
      <line x1="11.2" y1="2.8" x2="10.2" y2="3.8"/>
      <line x1="3.8" y1="10.2" x2="2.8" y2="11.2"/>
    </svg>
  </button>
</div>

<main>
  <div class="wrap">

    <div class="status-row">
      <div class="dot" id="dot"></div>
    </div>

    <div class="inp-area">
      <input id="inp" type="text"
        placeholder="вставте посилання на YouTube відео"
        autocomplete="off" spellcheck="false">
      <button id="clr" aria-label="Очистити">
        <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
          <line x1="1" y1="1" x2="9" y2="9"/>
          <line x1="9" y1="1" x2="1" y2="9"/>
        </svg>
      </button>
    </div>

    <div class="player-outer" id="playerOuter">
      <div class="player" id="player">
        <div class="ph" id="ph">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="1" y="3" width="18" height="14" rx="2"/>
            <polygon points="8,7 14,10 8,13" fill="currentColor" stroke="none" opacity="0.5"/>
          </svg>
          <p>очікую посилання</p>
        </div>
        <iframe id="frame"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen></iframe>
      </div>
    </div>

  </div>
</main>

<div class="toast" id="toast"></div>

<script>
  /* cursor */
  var curEl = document.getElementById('cur');
  document.addEventListener('mousemove', function(e) {
    curEl.style.left = e.clientX + 'px';
    curEl.style.top  = e.clientY + 'px';
  });
  document.querySelectorAll('button, input, a').forEach(function(el) {
    el.addEventListener('mouseenter', function() { curEl.classList.add('hover'); });
    el.addEventListener('mouseleave', function() { curEl.classList.remove('hover'); });
  });

  /* theme */
  var html = document.documentElement;
  var theme = 'dark';
  try { theme = localStorage.getItem('yt-theme') || 'dark'; } catch(e) {}
  html.setAttribute('data-theme', theme);

  function toggleTheme() {
    theme = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', theme);
    try { localStorage.setItem('yt-theme', theme); } catch(e) {}
  }

  document.getElementById('themeBtn').addEventListener('click', function(e) {
    e.stopPropagation();
    toggleTheme();
  });

  document.addEventListener('click', function(e) {
    var t = e.target;
    if (
      t === document.getElementById('inp') ||
      t === document.getElementById('clr') ||
      t.closest('#playerOuter') ||
      t.closest('.theme-btn')
    ) return;
    toggleTheme();
  });

  /* player */
  var inp   = document.getElementById('inp');
  var dot   = document.getElementById('dot');
  var clr   = document.getElementById('clr');
  var ph    = document.getElementById('ph');
  var frame = document.getElementById('frame');
  var toast = document.getElementById('toast');
  var cur   = null;

  function getId(s) {
    s = (s || '').trim();
    var m;
    m = s.match(/[?&]v=([a-zA-Z0-9_-]{11})/);     if (m) return m[1];
    m = s.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/); if (m) return m[1];
    m = s.match(/\/shorts\/([a-zA-Z0-9_-]{11})/);  if (m) return m[1];
    return null;
  }

  function play(id) {
    if (id === cur) return;
    cur = id;
    if (!id) {
      frame.src = 'about:blank';
      frame.className = '';
      ph.classList.remove('gone');
      return;
    }
    ph.classList.add('gone');
    frame.className = 'on';
    frame.src = 'https://www.youtube-nocookie.com/embed/' + id +
      '?autoplay=1&rel=0&modestbranding=1&iv_load_policy=3&fs=1';
  }

  function setDot(cls) {
    dot.className = 'dot' + (cls ? ' ' + cls : '');
  }

  inp.addEventListener('input', function() {
    var v = inp.value;
    clr.className = v ? 'on' : '';
    if (!v.trim()) {
      setDot('');
      play(null);
      return;
    }
    var id = getId(v);
    if (id) {
      setDot('ok');
      play(id);
    } else {
      setDot('err');
      play(null);
    }
  });

  clr.addEventListener('click', function(e) {
    e.stopPropagation();
    inp.value = '';
    setDot('');
    clr.className = '';
    play(null);
    inp.focus();
  });

  function showToast(msg) {
    toast.textContent = msg;
    toast.className = 'toast on';
    setTimeout(function() { toast.className = 'toast'; }, 2000);
  }

  window.addEventListener('load', function() { inp.focus(); });
</script>
</body>
</html>
